<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4JCraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a18;
      color: #d4c9a8;
      font-family: 'Inconsolata', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }

    .eyebrow {
      font-size: .75rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #6b6455;
      margin-bottom: .75rem;
    }

    .small-logo {
      width: 130px;   /* change from 48px to whatever size you want */
      height: 130px;
      object-fit: cover;
      image-rendering: pixelated;
      margin-bottom: .6rem;
      display: block;
    }

    .title-banner {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: pixelated;
      margin-bottom: .75rem;
    }

    .tagline {
      font-size: .9rem;
      color: #7a7060;
      margin-bottom: 3rem;
      border-left: 2px solid #3a3830;
      padding-left: .75rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .65rem 1rem;
      background: #222220;
      border: 1px solid #333330;
      color: #d4c9a8;
      text-decoration: none;
      font-family: 'Inconsolata', monospace;
      font-size: .95rem;
      transition: background .15s, border-color .15s, color .15s;
    }

    .link:hover {
      background: #2a2a26;
      border-color: #e8d9a0;
      color: #e8d9a0;
    }

    .link:hover .arrow { opacity: 1; }
    .link-label { flex: 1; }

    .arrow {
      font-size: .8rem;
      opacity: 0;
      transition: opacity .15s;
      color: #6b6455;
    }

    .link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
      opacity: .6;
    }

    .footer {
      margin-top: 3rem;
      font-size: .7rem;
      color: #3a3830;
      letter-spacing: .05em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="small-logo" src="https://raw.githubusercontent.com/4jcraft/4jcraft/dev/.github-assets/logo.jpg" alt="4JCraft icon" />
    <p class="eyebrow">community-driven</p>
    <img class="title-banner" src="logo.png" alt="4JCraft - Linux & Other Ports" />
    <p class="tagline">Legacy Console Edition ported to linux and other platforms</p>

    <nav class="links">
      <a class="link" href="https://github.com/4jcraft/4jcraft">

        <span class="link-label">GitHub</span>
        <span class="arrow">→</span>
      </a>
      <a class="link" href="https://discord.gg/2s2JzXCf8k">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        <span class="link-label">Discord</span>
        <span class="arrow">→</span>
      </a>
    </nav>

    <p class="footer">4jcraft — community project, not affiliated with mojang</p>
  </div>
</body>
</html>
